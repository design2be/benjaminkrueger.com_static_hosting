<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cutty Download</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        padding: 40px 20px;
        display: grid;
        place-items: start center;
      }
      main {
        width: min(720px, 100%);
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      .muted {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Downloading Cutty…</h1>
      <p class="muted">
        If your download doesn’t start automatically, choose your platform:
      </p>
      <ul>
        <li><a id="download-mac" href="../releases/cutty-latest.dmg">macOS (.dmg)</a></li>
        <li>
          <a id="download-win" href="../releases/cutty-latest.exe">Windows (.exe)</a>
        </li>
      </ul>
      <p class="muted">
        Detected platform: <code id="detected-platform">Detecting…</code>
      </p>
    </main>

    <script>
      (function () {
        var macHref = "../releases/cutty-latest.dmg";
        var winHref = "../releases/cutty-latest.exe";

        var ua = (navigator.userAgent || "").toLowerCase();
        var platform = (navigator.platform || "").toLowerCase();

        var isMac =
          platform.indexOf("mac") >= 0 ||
          ua.indexOf("mac os") >= 0 ||
          ua.indexOf("macintosh") >= 0;
        var isWindows =
          platform.indexOf("win") >= 0 ||
          ua.indexOf("windows") >= 0 ||
          ua.indexOf("win64") >= 0 ||
          ua.indexOf("win32") >= 0;

        var detectedEl = document.getElementById("detected-platform");
        if (detectedEl) {
          detectedEl.textContent = isMac
            ? "macOS"
            : isWindows
              ? "Windows"
              : platform || navigator.userAgent || "Unknown";
        }

        var target = isMac ? macHref : isWindows ? winHref : null;
        if (!target) return;

        // Use replace() so back button doesn't loop on this page.
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
